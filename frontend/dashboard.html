<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Road Complaint Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f7fc;
  
    color: #333;
}
.priority{

padding:6px 12px;

border-radius:20px;

font-weight:bold;

color:white;

display:inline-block;

min-width:90px;

text-align:center;

}

.priority.high{

background:#e74c3c;

}

.priority.medium{

background:#f39c12;

}

.priority.low{

background:#27ae60;

}
.charts{

display:flex;

justify-content:space-around;

flex-wrap:wrap;

margin:30px;

gap:20px;

}

.chart-card{

width:450px;

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.chart-card canvas{

height:300px!important;

}
/* HEADER */
.header {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* STATS CARDS */
.cards {
    display: flex;
    justify-content: space-around;
    margin: 20px;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 20px;
    width: 200px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    font-size: 18px;
    margin-bottom: 10px;
}

.card span {
    font-size: 22px;
    font-weight: bold;
    color: #1e3c72;
}

/* CONTROLS */
.controls {
    display: flex;
    justify-content: space-between;
    margin: 20px;
    flex-wrap: wrap;
}

input, select {
    padding: 10px;
    width: 250px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

/* TABLE */
table {
    width: 95%;
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

th {
    background: #1e3c72;
    color: white;
    padding: 12px;
}

td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

tr:hover {
    background: #f1f5ff;
}

/* STATUS */
.pending {
    color: orange;
    font-weight: bold;
}

.solved {
    color: green;
    font-weight: bold;
}

/* BUTTONS */
.btn {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin: 2px;
}

.solve-btn {
    background: #28a745;
    color: white;
}

.delete-btn {
    background: #dc3545;
    color: white;
}

.view-btn {
    background: #007bff;
    color: white;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .cards {
        flex-direction: column;
        align-items: center;
    }

    .controls {
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    input, select {
        width: 90%;
    }
}
</style>

</head>

<body>

<div class="header">
🚧 Smart Road Complaint Management System
</div>
<div style="display:flex;justify-content:flex-end;gap:10px;padding:15px 20px;">

    <button onclick="window.location.href='complaint.html'" class="btn" style="background:#28a745;color:white;">
        ➕ Add Complaint
    </button>

</div>

<!-- STATS -->
<div class="cards">
    <div class="card">
        <h3>Total Complaints</h3>
        <span id="total">0</span>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <span id="pending">0</span>
    </div>

    <div class="card">
        <h3>Solved</h3>
        <span id="solved">0</span>
    </div>
    
</div>
<div class="charts">

    <div class="chart-card">

        <h3>Complaint Status</h3>

        <canvas id="statusChart"></canvas>

    </div>

    <div class="chart-card">

        <h3>Complaint Categories</h3>

        <canvas id="categoryChart"></canvas>

    </div>

</div>

<!-- SEARCH & FILTER -->
<div class="controls">
    <input type="text" id="search" placeholder="Search by name or location...">

    <select id="filter">
        <option value="all">All</option>
        <option value="Pending">Pending</option>
        <option value="Solved">Solved</option>
    </select>
</div>
<div class="report-buttons">

    <button onclick="exportCSV()" class="btn export-btn">
        📊 Export CSV
    </button>

    <button onclick="exportPDF()" class="btn pdf-btn">
        📄 Export PDF
    </button>

    <button onclick="window.print()" class="btn print-btn">
        🖨 Print Report
    </button>

</div>
<!-- TABLE -->
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Location</th>
            <th>Description</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="tbody">
        <!-- JS DATA -->
    </tbody>
</table>
<script>
    // CHECK LOGIN STATUS
    if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "admin.html";
    }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<script src="script.js"></script>
<button onclick="logout()" style="
    position:absolute;
    right:20px;
    top:20px;
    padding:8px 15px;
    background:red;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
">
Logout
</button>
<div id="imageModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
background:white;
width:850px;
max-width:95%;
border-radius:12px;
padding:20px;
display:flex;
gap:25px;
position:relative;
">

<button onclick="document.getElementById('imageModal').style.display='none'"
style="
position:absolute;
right:15px;
top:10px;
border:none;
background:none;
font-size:24px;
cursor:pointer;
">
✖
</button>

<img id="modalImg"
style="
width:320px;
height:260px;
object-fit:cover;
border-radius:10px;
">

<div id="modalInfo"
style="
flex:1;
font-size:16px;
line-height:1.8;
">
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
